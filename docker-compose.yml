services:
  core-keeper:
    image: escaping/core-keeper-dedicated:v2.8.1
    container_name: ikb-core-keeper-server
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - ./data/server-files:/home/steam/core-keeper-dedicated
      - ./data/world-data:/home/steam/core-keeper-data
    env_file:
      - path: .env
        required: false
        format: raw
    healthcheck:
      test: ["CMD-SHELL", "test -s /home/steam/core-keeper-dedicated/GameID.txt"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: ikb-core-keeper-network
